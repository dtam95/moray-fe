
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moray Collective — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Bitter">  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #e4e1e1;
      --fg: #1a1a18;
      --muted: #8a8680;
      --accent: #3d3b37;
      --rule: #d4d0ca;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Bitter', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.3em;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--rule);
      margin: 1.6rem auto;
    }

    .tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 300;
      animation: fadeUp 1.2s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

  </style>

    <style>
  .lantern {
    position: relative;
    width: 160px;
    height: 230px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
  }

  .lantern-glow {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 210, 80, 0.9), rgba(255, 70, 20, 0.18), transparent 70%);
    filter: blur(18px);
    animation: glow 1.6s ease-in-out infinite;
  }

  .lantern-top,
  .lantern-bottom {
    position: absolute;
    left: 42px;
    width: 76px;
    height: 22px;
    background: #7a1e12;
    border-radius: 8px;
    z-index: 2;
  }

  .lantern-top { top: 22px; }
  .lantern-bottom { bottom: 48px; }

  .lantern-body {
    position: absolute;
    top: 40px;
    left: 28px;
    width: 104px;
    height: 138px;
    background: radial-gradient(circle at 50% 42%, #ffd75a 0%, #ff6b26 42%, #d92618 100%);
    border: 5px solid #7a1e12;
    border-radius: 25% 25% 32% 32%;
    box-shadow: inset 0 0 22px rgba(255, 245, 140, 0.75);
    z-index: 3;
    animation: bodyPulse 1.6s ease-in-out infinite;
  }

  .lantern-line {
    position: absolute;
    top: 8px;
    bottom: 8px;
    width: 3px;
    background: rgba(120, 20, 10, 0.45);
    border-radius: 40px;
  }

  .lantern-line:nth-child(1) { left: 26px; }
  .lantern-line:nth-child(2) { left: 50%; transform: translateX(-50%); }
  .lantern-line:nth-child(3) { right: 26px; }

  .lantern-tassel {
    position: absolute;
    left: 76px;
    bottom: 10px;
    width: 8px;
    height: 48px;
    background: #7a1e12;
    border-radius: 99px;
    z-index: 1;
    transform-origin: top;
    animation: tassel 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 0.55; transform: scale(0.92); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  @keyframes bodyPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.25); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-8px) rotate(1deg); }
  }

  @keyframes tassel {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }

  #lantern-container {
      padding: 100px;
  }
</style>
</head>
<body>

  <div class="container">
      <div id="lantern-container">
      <div class="lantern" aria-label="glowing lantern">
  <div class="lantern-glow"></div>
  <div class="lantern-top"></div>
  <div class="lantern-body">
    <div class="lantern-line"></div>
    <div class="lantern-line"></div>
    <div class="lantern-line"></div>
  </div>
  <div class="lantern-bottom"></div>
  <div class="lantern-tassel"></div>
</div>

          </div>


    <h1 class="brand">Moray Collective</h1>
    <div class="rule"></div>
    <p class="tagline">Coming soon</p>
  </div>

  <p class="footer">&copy; 2026 Moray Collective</p>

</body>
</html>
