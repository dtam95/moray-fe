
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moray Collective — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f2ed;
      --fg: #1a1a18;
      --muted: #8a8680;
      --accent: #3d3b37;
      --rule: #d4d0ca;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'SansSerif', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.3em;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--rule);
      margin: 1.6rem auto;
    }

    .tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 300;
      animation: fadeUp 1.2s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1 class="brand">Moray Collective</h1>
    <div class="rule"></div>
    <p class="tagline">Coming soon</p>
  </div>

  <p class="footer">&copy; 2026 Moray Collective</p>

</body>
</html>
